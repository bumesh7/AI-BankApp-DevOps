name: DevSecOps Pipeline

on:
  push:
    branches: [ main, devsecops ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'screenshots/**'
      - 'scripts/**'

permissions:
  id-token: write        # Required for OIDC
  contents: read
  security-events: write # Required for uploading SARIF reports

jobs:

  # ============================================================
  # GATE 1: SAST - Static Application Security Testing
  # ============================================================
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/secrets

  # ============================================================
  # GATE 2: SCA - Software Composition Analysis
  # ============================================================
  sca:
    name: SCA - OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP NVD Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DsuppressionFile=suppression.xml \
            || true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html

  # ============================================================
  # GATE 3: BUILD
  # ============================================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [ sast, sca ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ============================================================
  # GATE 4: CONTAINER IMAGE SCAN - Trivy
  # ============================================================
  image_scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (for scanning)
        run: docker build -t bankapp:scan-${{ github.sha }} .

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bankapp:scan-${{ github.sha }}
          format: 'table'
          exit-code: '0'         # Audit mode: report findings but do not block pipeline
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt
          trivy-config: trivy.yaml

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt

  # ============================================================
  # GATE 5: PUSH TO ECR
  # ============================================================
  push_to_ecr:
    name: Push to ECR
    needs: image_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ============================================================
  # GATE 6: DEPLOY
  # ============================================================
  deploy:
    name: Deploy to EC2 via SSH
    needs: push_to_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Deployment Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/bankapp

      - name: Copy app-tier.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app-tier.yml"
          target: "~/bankapp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            
            cd ~/bankapp
            
            # Fetch secrets from Secrets Manager and create .env
            aws secretsmanager get-secret-value --secret-id bankapp/prod-secrets --query SecretString --output text > secrets.json
            
            # Extract variables and write to .env
            echo "DB_HOST=$(jq -r .DB_HOST secrets.json)" > .env
            echo "DB_PORT=$(jq -r .DB_PORT secrets.json)" >> .env
            echo "DB_NAME=$(jq -r .DB_NAME secrets.json)" >> .env
            echo "DB_USER=$(jq -r .DB_USER secrets.json)" >> .env
            echo "DB_PASSWORD=$(jq -r .DB_PASSWORD secrets.json)" >> .env
            echo "OLLAMA_URL=$(jq -r .OLLAMA_URL secrets.json)" >> .env
            echo "ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> .env
            echo "ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}" >> .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
            
            # Clean up
            rm secrets.json
            
            # Pull and Deploy using the app-tier.yml transferred via SCP
            docker compose -f app-tier.yml pull
            docker compose -f app-tier.yml up -d --build

  # ============================================================
  # GATE 7: DAST - Dynamic Application Security Testing
  # ============================================================
  dast:
    name: DAST - OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        continue-on-error: true  # ZAP internal artifact upload has a known naming bug
        with:
          target: 'http://${{ secrets.EC2_HOST }}:8080'
          artifact_name: zap-scan-results
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html