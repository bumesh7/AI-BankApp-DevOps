# docker build && docker run
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: bankappdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTest@123"] # use localhost because its inside the container
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bankapp-nw


  bankapp:
    build: .
    container_name: bankapp
    ports:
    - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: Test@123
      OLLAMA_URL: http://ollama:11434
    depends_on:
      mysql: # container name
        condition: service_healthy
    networks:
      - bankapp-nw

  ollama:
   image: ollama/ollama
   container_name: ollama
   ports:
   - "11434:11434"
   volumes:
   - ollama_data:/root/.ollama
   networks:
   - bankapp-nw

# create docker network
networks:
  bankapp-nw:
    driver: bridge

# create docker volumes
volumes:
  mysql-data:
  ollama_data:
 

